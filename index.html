<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Loup-Garou">
  <title>Loup-Garou Solo Phone</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-glow background-glow-a"></div>
  <div class="background-glow background-glow-b"></div>

  <main id="app" class="app-shell" aria-live="polite"></main>

  <noscript>
    <section class="fallback-card">
      <h1>JavaScript requis</h1>
      <p>Active JavaScript pour lancer la partie sur ce telephone.</p>
    </section>
  </noscript>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js").catch(function (error) {
          console.error("Service worker registration failed:", error);
        });
      });
    }
  </script>
</body>
</html>
